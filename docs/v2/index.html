<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>II Campeonato Sprint Pádel</title>

    <link
        rel="stylesheet"
        href="style.css?v=162"
    >

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >
</head>

<body>

    <div class="contenedor">

        <!-- =========================================
             CABECERA
        ========================================== -->

        <header class="cabecera">

            <div class="tituloSuperior">
                II CAMPEONATO
            </div>

            <div class="tituloPrincipal">
                Sprint Pádel
            </div>

            <div class="subtitulo">
                Tui · 2026
            </div>

            <div
                class="estadoCabecera"
                id="estadoCabecera"
            >
                🟢 Cargando...
            </div>

            <div class="progresoCabecera">

                <div class="barra">
                    <div
                        class="progreso"
                        id="barraProgreso"
                    ></div>
                </div>

                <div
                    class="textoProgreso"
                    id="textoProgreso"
                ></div>

            </div>

            <div class="actualizacion">

                <span>
                    🕒 Última actualización:
                </span>

                <strong id="ultimaActualizacion">
                    --
                </strong>

            </div>

        </header>


        <!-- =========================================
             ACCESOS DE LA PORTADA
        ========================================== -->

        <section class="gridDashboard">

            <!-- COMPETICIÓN -->

            <div
                class="cardAcceso cardClasificacion"
                data-seccion="competicion"
            >

                <div class="iconoAcceso">
                    📊
                </div>

                <div>

                    <h4 id="tituloTarjetaCompeticion">
                        Competición
                    </h4>

                    <p id="resumenCompeticion">
                        Cargando...
                    </p>

                </div>

                <span class="flecha">
                    →
                </span>

            </div>


            <!-- PARTIDOS -->

            <div
                class="cardAcceso cardPartidos"
                data-seccion="partidos"
            >

                <div class="iconoAcceso">
                    🎾
                </div>

                <div>

                    <h4>
                        Partidos
                    </h4>

                    <p id="resumenPartidos">
                        Cargando...
                    </p>

                </div>

                <span class="flecha">
                    →
                </span>

            </div>


            <!-- EQUIPOS -->

            <div
                class="cardAcceso cardPalas"
                data-seccion="equipos"
            >

                <div class="iconoAcceso">
                    👥
                </div>

                <div>

                    <h4>
                        Equipos
                    </h4>

                    <p id="resumenEquipos">
                        Cargando...
                    </p>

                </div>

                <span class="flecha">
                    →
                </span>

            </div>


            <!-- FASE ESPECIAL -->

            <div
                class="cardAcceso cardCruces"
                id="tarjetaEspecial"
                data-seccion="especial"
            >

                <div
                    class="iconoAcceso"
                    id="iconoTarjetaEspecial"
                >
                    ⚔️
                </div>

                <div>

                    <h4 id="tituloTarjetaEspecial">
                        Siguiente fase
                    </h4>

                    <p id="resumenEspecial">
                        Pendiente de iniciar
                    </p>

                </div>

                <span class="flecha">
                    →
                </span>

            </div>

        </section>


        <!-- =========================================
             RESUMEN DE LA FASE ACTIVA
        ========================================== -->

        <section class="tarjeta podioCard">

            <h3 id="tituloPodio">
                📊 Resumen de la competición
            </h3>

            <div id="podio">
                Cargando...
            </div>

        </section>


        <!-- =========================================
             CONTENIDO DE LAS PANTALLAS
        ========================================== -->

        <section
            id="vistaDetalle"
            class="vistaDetalle oculto"
        >

            <div id="contenidoDetalle"></div>

        </section>

    </div>


    <!-- =========================================
         NAVEGACIÓN INFERIOR FIJA
    ========================================== -->

    <nav class="bottomNav">

        <button
            class="navBtn navActivo"
            data-pantalla="inicio"
            type="button"
        >

            <span>
                🏠
            </span>

            <small>
                Inicio
            </small>

        </button>


        <button
            class="navBtn"
            data-pantalla="competicion"
            type="button"
        >

            <span>
                📊
            </span>

            <small>
                Competición
            </small>

        </button>


        <button
            class="navBtn"
            data-pantalla="partidos"
            type="button"
        >

            <span>
                🎾
            </span>

            <small>
                Partidos
            </small>

        </button>


        <button
            class="navBtn"
            data-pantalla="equipos"
            type="button"
        >

            <span>
                👥
            </span>

            <small>
                Equipos
            </small>

        </button>


        <button
            class="navBtn"
            data-pantalla="mas"
            type="button"
        >

            <span>
                ☰
            </span>

            <small>
                Más
            </small>

        </button>

    </nav>


    <script src="app.js?v=162"></script>

</body>

</html>
