<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>II Campeonato Sprint Pádel</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="contenedor">

    <header class="cabecera">

        <div class="tituloSuperior">II CAMPEONATO</div>
        <div class="tituloPrincipal">Sprint Pádel</div>
        <div class="subtitulo">Tui · 2026</div>

        <div class="estadoCabecera" id="estadoCabecera">
            🟢 Cargando...
        </div>

        <div class="progresoCabecera">
            <div class="barra">
                <div class="progreso" id="barraProgreso"></div>
            </div>

            <div class="textoProgreso" id="textoProgreso"></div>
        </div>

        <div class="actualizacion">
            Última actualización
            <strong id="ultimaActualizacion">--</strong>
        </div>

    </header>

    <section class="gridDashboard">

        <div class="cardAcceso cardClasificacion" data-seccion="clasificacion">
            <div class="iconoAcceso">📊</div>
            <div>
                <h4>Clasificación</h4>
                <p id="resumenClasificacion">Cargando...</p>
            </div>
            <span class="flecha">→</span>
        </div>

        <div class="cardAcceso cardPartidos" data-seccion="partidos">
            <div class="iconoAcceso">🎾</div>
            <div>
                <h4>Partidos</h4>
                <p id="resumenPartidos">Cargando...</p>
            </div>
            <span class="flecha">→</span>
        </div>

        <div class="cardAcceso cardCruces" data-seccion="cruces">
            <div class="iconoAcceso">⚔️</div>
            <div>
                <h4>Eliminatorias</h4>
                <p id="resumenCruces">Cargando...</p>
            </div>
            <span class="flecha">→</span>
        </div>

        <div class="cardAcceso cardPalas" data-seccion="palas">
            <div class="iconoAcceso">🏖️</div>
            <div>
                <h4>Copa Palas Playa</h4>
                <p id="resumenPalas">Cargando...</p>
            </div>
            <span class="flecha">→</span>
        </div>

    </section>

    <section class="tarjeta podioCard">

        <h3>🥇 Podio provisional</h3>

        <div id="podio">
            Cargando...
        </div>

    </section>

    <section id="vistaDetalle" class="vistaDetalle oculto">

        <div id="contenidoDetalle"></div>

    </section>

</div>

<nav class="bottomNav">

    <button class="navBtn navActivo" data-pantalla="inicio">
        <span>🏠</span>
        <small>Inicio</small>
    </button>

    <button class="navBtn" data-pantalla="clasificacion">
        <span>📊</span>
        <small>Clasificación</small>
    </button>

    <button class="navBtn" data-pantalla="partidos">
        <span>🎾</span>
        <small>Partidos</small>
    </button>

    <button class="navBtn" data-pantalla="mas">
        <span>☰</span>
        <small>Más</small>
    </button>

</nav>

<script src="app.js"></script>

</body>
</html>
