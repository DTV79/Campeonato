<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>II Campeonato Sprint Pádel</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="contenedor">

    <!-- CABECERA -->

    <header class="cabecera">

        <div class="logo">

            🏆

        </div>

        <h1>II Campeonato</h1>

        <h2>Sprint Pádel</h2>

        <span>Tui 2026</span>

        <div class="actualizacion">

            Última actualización

            <strong id="ultimaActualizacion">
                --
            </strong>

        </div>

    </header>

    <!-- ESTADO -->

    <section class="tarjeta">

        <h3>📊 Estado del campeonato</h3>

        <div class="fase" id="faseActual">

            Cargando...

        </div>

        <div class="barra">

            <div class="progreso" id="barraProgreso"></div>

        </div>

        <div class="textoProgreso" id="textoProgreso">

            ...

        </div>

    </section>

    <!-- PODIO -->

    <section class="tarjeta">

        <h3>🥇 Podio provisional</h3>

        <div id="podio">

            Cargando...

        </div>

    </section>

    <!-- BOTONES -->

    <section class="botones">

        <button>📊 Clasificación</button>

        <button>🎾 Partidos</button>

        <button>⚔️ Eliminatorias</button>

        <button>🏖 Copa Palas Playa</button>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
