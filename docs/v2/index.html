<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>II Campeonato Sprint Pádel</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="contenedor">

    <!-- CABECERA -->

    <header class="cabecera">

    <div class="tituloSuperior">
        II CAMPEONATO
    </div>

    <div class="tituloPrincipal">
        Sprint Pádel
    </div>

    <div class="subtitulo">
        Tui · 2026
    </div>

    <div class="estadoCabecera" id="estadoCabecera">
        🟢 Cargando...
    </div>

    <div class="actualizacion">
        Última actualización
        <strong id="ultimaActualizacion">--</strong>
    </div>

</header>

    <!-- ESTADO -->

    <section class="tarjeta">

        <h3>📊 Estado del campeonato</h3>

        <div class="fase" id="faseActual">

            Cargando...

        </div>

        <div class="barra">

            <div class="progreso" id="barraProgreso"></div>

        </div>

        <div class="textoProgreso" id="textoProgreso">

            ...

        </div>

    </section>

    <!-- PODIO -->

    <section class="tarjeta">

        <h3>🥇 Podio provisional</h3>

        <div id="podio">

            Cargando...

        </div>

    </section>

    <!-- BOTONES -->

    <section class="gridDashboard">

    <div class="cardAcceso" data-seccion="clasificacion">
        <div class="iconoAcceso">📊</div>
        <h4>Clasificación</h4>
        <p id="resumenClasificacion">Cargando...</p>
    </div>

    <div class="cardAcceso" data-seccion="partidos">
        <div class="iconoAcceso">🎾</div>
        <h4>Partidos</h4>
        <p id="resumenPartidos">Cargando...</p>
    </div>

    <div class="cardAcceso" data-seccion="cruces">
        <div class="iconoAcceso">⚔️</div>
        <h4>Eliminatorias</h4>
        <p id="resumenCruces">Cargando...</p>
    </div>

    <div class="cardAcceso" data-seccion="palas">
        <div class="iconoAcceso">🏖️</div>
        <h4>Copa Palas Playa</h4>
        <p id="resumenPalas">Cargando...</p>
    </div>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
