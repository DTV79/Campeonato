<script>
(async function cargarNavegacionVersionada() {

    const URL_ESTADO =
        "https://dtv79.github.io/Campeonato/estado_torneo.json";

    let version = Date.now();

    try {
        const respuesta = await fetch(
            `${URL_ESTADO}?v=${Date.now()}`,
            {
                cache: "no-store"
            }
        );

        if (respuesta.ok) {
            const estado = await respuesta.json();
            const configuracion =
                estado?.configuracion || {};

            version =
                configuracion.version_web ||
                configuracion.version ||
                version;
        }

    } catch (error) {
        console.error(
            "No se pudo leer la versión WEB:",
            error
        );
    }

    const script =
        document.createElement("script");

    script.src =
        `nav-pretorneo.js?v=${encodeURIComponent(version)}`;

    script.async = false;

    document.body.appendChild(script);

})();
</script>
